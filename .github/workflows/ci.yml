name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install JS deps
        run: bun install

      - name: Install Python deps
        run: pip install -r mini-services/excel-service/requirements.txt pytest

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

      - name: Python smoke
        run: bun run test:python

      - name: Build
        run: bun run build

  security-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: npm audit (JS)
        run: bun pm audit || true
      - name: pip audit (Python)
        run: pip install pip-audit && pip-audit -r mini-services/excel-service/requirements.txt || true
