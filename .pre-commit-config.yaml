# Pre-commit hooks configuration for OMiK_VSM
# Install: pip install pre-commit && pre-commit install

repos:
  # Python formatting and linting
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: Format Python code
        args: [--line-length=100]
        files: ^mini-services/excel-service/.*\.py$
        exclude: ^mini-services/excel-service/tests/.*$

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        name: Check Python style
        args: [--max-line-length=100, --ignore=E501,W503,E203]
        files: ^mini-services/excel-service/.*\.py$
        exclude: ^mini-services/excel-service/tests/.*$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        name: Type check Python
        args: [--ignore-missing-imports, --strict-optional]
        files: ^mini-services/excel-service/.*\.py$
        exclude: ^mini-services/excel-service/tests/.*$

  # JavaScript/TypeScript formatting and linting
  - repo: local
    hooks:
      - id: prettier
        name: Format TypeScript/JavaScript
        entry: bun run format
        language: system
        types_or: [ts, tsx, js, jsx]
        files: ^src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: eslint
        name: Lint TypeScript/JavaScript
        entry: bun run lint
        language: system
        types_or: [ts, tsx, js, jsx]
        files: ^src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: typecheck
        name: Type check TypeScript
        entry: bun run typecheck
        language: system
        types_or: [ts, tsx]
        files: ^src/.*\.(ts|tsx)$
        pass_filenames: false

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets in code
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json|.secrets.baseline

  # General checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Remove trailing whitespace
      - id: end-of-file-fixer
        name: Ensure file ends with newline
      - id: check-yaml
        name: Validate YAML files
      - id: check-json
        name: Validate JSON files
      - id: check-added-large-files
        name: Prevent large files from being added
        args: ['--maxkb=5000']
